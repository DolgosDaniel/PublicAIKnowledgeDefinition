name: paik-validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install -r tools/requirements.txt
      - name: Run validator unit tests
        run: python -m unittest tools.test_paik_validate -v
      - name: Check template frontmatter is valid YAML
        run: python tools/check_templates.py
      - name: Validate example projects
        run: >
          python tools/paik_validate.py
          examples/simple-project/paik
          examples/complex-project/paik
          examples/external-dependencies-project/paik
          examples/cross-functional-product/paik
          examples/minimal-planning-project/paik
          examples/mixed-components-project/paik
          examples/monorepo-project/paik
          examples/operations-ready-project/paik
