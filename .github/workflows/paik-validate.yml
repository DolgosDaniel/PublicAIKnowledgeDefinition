name: paik-validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install -r tools/requirements.txt
      - name: Validate example projects
        run: >
          python tools/paik_validate.py
          examples/simple-project/paik
          examples/complex-project/paik
          examples/external-dependencies-project/paik
